services:
  - type: web
    name: streampulse-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_USERS
        value: "120"
      - key: DEMO_EVENT_RATE_HZ
        value: "8"
      - key: WEB_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: TMDB_API_KEY
        sync: false
